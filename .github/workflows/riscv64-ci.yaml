name: Debian riscv64 Package Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-riscv64:
    runs-on: ubuntu-latest

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Custom RISC-V Environment Image
        run: |
          docker build --platform linux/riscv64 --load -t my-riscv-env -f dockerfile .

      - name: Build Package inside emulated Debian environment
        run: |
          docker run --rm \
            --platform linux/riscv64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            my-riscv-env \
            bash -c "
              apt-get update && \
              apt-get install -y build-essential devscripts lintian quilt && \

              apt-get install -y cmake && \
              
              DEBIAN_PATH=\$(find . -maxdepth 3 -type d -name 'debian' | head -n 1)
              
              if [ -z \"\$DEBIAN_PATH\" ]; then
                echo 'Error: Could not find a debian/ directory in this commit!'
                exit 1
              fi
              
              SRC_DIR=\$(dirname \"\$DEBIAN_PATH\")
              echo \"Found local package source at: \$SRC_DIR\"
              
              if [ \"\$SRC_DIR\" = \".\" ]; then
                mkdir -p /workspace/build-output/src
                find . -maxdepth 1 ! -name 'build-output' ! -name '.' -exec cp -r {} /workspace/build-output/src/ \;
                cd /workspace/build-output/src
              else
                cd \"\$SRC_DIR\"
              fi
              
              apt-get build-dep -y . && \
              
              dpkg-buildpackage -us -uc -b && \
              
              echo 'BUILD OK  ✅' && \
              echo 'Generated artifacts:' && \
              ls -la ../*.deb && \
              ctest --output-on-failure -j$(nproc) && \
              echo 'All tests Passed 🚀'
            "