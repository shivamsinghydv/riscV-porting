name: Debian riscv64 Package Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-riscv64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Test inside Full RISC-V System Emulation
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: riscv64
          distro: ubuntu24.04
          githubToken: ${{ github.token }}
          run: |
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && \
            apt-get install -y build-essential devscripts lintian quilt cmake \
                               python3 python3-pip python3-setuptools

            DEBIAN_PATH=$(find . -maxdepth 3 -type d -name 'debian' | head -n 1)
            
            if [ -z "$DEBIAN_PATH" ]; then
              echo 'Error: Could not find a debian/ directory in this commit!'
              exit 1
            fi
            
            SRC_DIR=$(dirname "$DEBIAN_PATH")
            echo "Found local package source at: $SRC_DIR"
            
            if [ "$SRC_DIR" = "." ]; then
              mkdir -p /workspace/build-output/src
              find . -maxdepth 1 ! -name 'build-output' ! -name '.' -exec cp -r {} /workspace/build-output/src/ \;
              cd /workspace/build-output/src
            else
              cd "$SRC_DIR"
            fi
            
            apt-get build-dep -y . || apt-get install -y $(dpkg-checkbuilddeps 2>&1 | sed 's/.*Unmet build dependencies: //;s/([^)]*)//g')
            
            dpkg-buildpackage -us -uc -b
            
            echo 'BUILD & NATIVE TESTS OK  ✅'
            echo 'Generated artifacts:'
            ls -la ../*.deb